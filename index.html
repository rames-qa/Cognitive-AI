<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive AI - Robotics & Vision Systems Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark-main: #0b0f19;
            --bg-dark-panel: #141b2d;
            --border-color: #222f4c;
            --neon-blue: #00f3ff;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-rose: #ff3366;
            --neon-amber: #f59e0b;
            --text-primary: #f0f4f8;
            --text-secondary: #8a99ad;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Updated to Plus Jakarta Sans */
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark-main);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px 5%;
            background: rgba(20, 27, 45, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.4rem;
            font-weight: 800; /* Made slightly heavier for tracking look */
            letter-spacing: 1.5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            padding: 5px 10px;
            letter-spacing: 0.5px;
        }

        nav ul li a:hover {
            color: var(--neon-blue);
        }

        .hero {
            padding: 40px 5% 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.3;
            letter-spacing: -0.02em; /* Gives clean premium tech spacing */
        }

        .hero p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .voice-console-card {
            background: var(--bg-dark-panel);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .voice-status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #64748b;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .status-dot.active {
            background-color: var(--neon-rose);
            box-shadow: 0 0 12px var(--neon-rose);
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .voice-transcript-box {
            background: #090d16;
            padding: 15px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            min-height: 65px;
            font-size: 0.95rem;
            color: #ffffff;
            border: 1px solid #1a243a;
            word-break: break-word;
            text-align: left;
            position: relative;
        }

        .transcript-placeholder {
            color: var(--text-secondary);
            font-style: italic;
        }

        .hero-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .voice-btn {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
        }

        .voice-btn.listening {
            background: var(--neon-rose);
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }

        .dashboard {
            padding: 20px 5% 40px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -0.01em;
        }

        .cognitive-grid, .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            margin-bottom: 25px;
        }

        .sub-panel, .dashboard-box {
            background: var(--bg-dark-panel);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .voice-pulse-highlight {
            border-color: var(--neon-rose) !important;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.25);
        }

        .sub-panel-header, .dashboard-header-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-bottom: 1px solid #1e2942;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .sub-panel-header h3, .glow-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }

        .audio-pill-badge {
            align-self: flex-start;
            background: rgba(16, 185, 129, 0.1);
            color: var(--neon-green);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .audio-pill-badge.active {
            background: rgba(255, 51, 102, 0.1);
            color: var(--neon-rose);
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .emotion-tracker-container {
            background: #090d16;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90px;
        }

        .emotion-tracker-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .emotion-token-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .live-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-height: 48px;
            font-weight: 400;
        }

        .voice-bar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 70px;
            margin: 10px 0;
            background: #090d16;
            border-radius: 8px;
            padding: 0 10px;
        }

        .eq-bar {
            flex: 1;
            max-width: 8px;
            height: 10%;
            background: var(--neon-blue);
            border-radius: 3px;
            transition: height 0.05s ease;
        }

        .matrix-track-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .metric-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .metric-label-row .metric-value {
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            font-weight: 700;
        }

        .track-bg, .progress-bar {
            background: #090d16;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .track-fill, .progress {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.2s ease-out;
        }

        .progress { background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); }
        #analyticsBox .progress { background: linear-gradient(to right, var(--neon-purple), var(--neon-green)); }
        #automationBox .progress { background: linear-gradient(to right, var(--neon-green), var(--neon-blue)); }

        .track-fill.calm { background: var(--neon-green); }
        .track-fill.friction { background: var(--neon-amber); }
        .track-fill.load { background: var(--neon-purple); }

        .dashboard-metrics-grid, .stats-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .dashboard-metrics-grid {
            grid-template-columns: 1fr 1fr;
        }

        .sub-metric-card, .stat-node {
            background: #090d16;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #1a243a;
            text-align: center;
        }

        .sub-metric-card p, .stat-node small {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .sub-metric-card h5, .stat-node span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }

        .live-telemetry-canvas {
            width: 100%;
            height: 65px;
            background: #0d1322;
            border-radius: 6px;
            display: block;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            background: #090d16;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @media (min-width: 768px) {
            nav { flex-direction: row; justify-content: space-between; padding: 18px 8%; }
            .hero { padding: 60px 8% 30px; }
            .hero h1 { font-size: 2.6rem; }
            .sub-panel-header { flex-direction: row; justify-content: space-between; align-items: center; }
            .audio-pill-badge { align-self: center; }
            .cognitive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
            .dashboard-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
            .section-title { font-size: 2rem; margin-bottom: 40px; }
        }
    </style>
</head>
