<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive AI - Comprehensive Control Center</title>
    <style>
        :root {
            --bg-dark-main: #0b0f19;
            --bg-dark-panel: #141b2d;
            --border-color: #222f4c;
            --neon-blue: #00f3ff;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-rose: #ff3366;
            --text-primary: #f0f4f8;
            --text-secondary: #8a99ad;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark-main); color: var(--text-primary); }

        nav { padding: 20px 5%; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--neon-blue); }

        .hero { padding: 40px 5%; text-align: center; }
        .voice-console-card { background: var(--bg-dark-panel); padding: 20px; border-radius: 14px; border: 1px solid var(--border-color); max-width: 600px; margin: 20px auto; }
        
        .audio-scope-container { width: 100%; height: 100px; background: #090d16; border-radius: 8px; margin: 10px 0; overflow: hidden; }
        .audio-scope-canvas { width: 100%; height: 100%; display: block; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; }
        .dashboard-box { background: var(--bg-dark-panel); padding: 20px; border-radius: 14px; border: 1px solid var(--border-color); transition: all 0.3s ease; }
        
        /* Peak Alert Effect */
        .peak-alert { filter: hue-rotate(270deg) brightness(1.2); border-color: var(--neon-rose); box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }

        .btn { padding: 15px 30px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); color: white; margin-top: 20px; }
        
        .eq-container { display: flex; align-items: flex-end; justify-content: center; gap: 5px; height: 50px; margin-top: 10px; }
        .eq-bar { width: 10px; background: var(--neon-blue); transition: height 0.1s ease; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">COGNITIVE AI // SYSTEM</div>
    </nav>

    <section class="hero">
        <h1>Neural Acoustic Interface</h1>
        <div class="voice-console-card">
            <div id="voiceStatusText">Acoustic Engine Offline</div>
            <div class="audio-scope-container">
                <canvas id="waveformCanvas" class="audio-scope-canvas"></canvas>
            </div>
            <button class="btn" id="btnVoiceTrigger">INITIALIZE SENSORS</button>
            <h2 id="liveDecibel">-60 dB</h2>
        </div>
    </section>

    <section class="dashboard">
        <div class="dashboard-box">
            <h3>Voice Frequency EQ</h3>
            <div class="eq-container" id="eqContainer">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>
        </div>
        <div class="dashboard-box">
            <h3>Neural Velocity</h3>
            <p id="valNeuralVelocity">0%</p>
        </div>
    </section>

    <script>
        const SystemState = { audioContext: null, analyser: null, dataArray: null, timeDataArray: null };
        const waveCanvas = document.getElementById("waveformCanvas");
        const waveCtx = waveCanvas.getContext("2d");

        async function initSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                SystemState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                SystemState.analyser = SystemState.audioContext.createAnalyser();
                SystemState.analyser.fftSize = 2048;
                
                const source = SystemState.audioContext.createMediaStreamSource(stream);
                source.connect(SystemState.analyser);
                
                SystemState.dataArray = new Uint8Array(SystemState.analyser.frequencyBinCount);
                SystemState.timeDataArray = new Uint8Array(SystemState.analyser.fftSize);
                
                document.getElementById("voiceStatusText").textContent = "Acoustic Engine Online";
                renderLoop();
            } catch (err) { alert("Microphone access denied."); }
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            SystemState.analyser.getByteTimeDomainData(SystemState.timeDataArray);
            SystemState.analyser.getByteFrequencyData(SystemState.dataArray);

            // Draw Waveform
            waveCtx.fillStyle = "#090d16";
            waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
            waveCtx.strokeStyle = "#00f3ff";
            waveCtx.beginPath();
            let sliceWidth = waveCanvas.width / SystemState.analyser.fftSize;
            let x = 0;
            for (let i = 0; i < SystemState.analyser.fftSize; i++) {
                let v = SystemState.timeDataArray[i] / 128.0;
                let y = v * waveCanvas.height / 2;
                i === 0 ? waveCtx.moveTo(x, y) : waveCtx.lineTo(x, y);
                x += sliceWidth;
            }
            waveCtx.stroke();

            // Calculate Decibels & Peak Alert
            let sum = SystemState.dataArray.reduce((a, b) => a + b, 0);
            let db = Math.round((sum / SystemState.dataArray.length / 255) * 100 - 60);
            document.getElementById("liveDecibel").textContent = db + " dB";

            const boxes = document.querySelectorAll('.dashboard-box');
            if (db > -20) {
                boxes.forEach(b => b.classList.add('peak-alert'));
            } else {
                boxes.forEach(b => b.classList.remove('peak-alert'));
            }

            // Update EQ bars
            document.querySelectorAll('.eq-bar').forEach((bar, i) => {
                bar.style.height = (SystemState.dataArray[i * 10] / 255) * 100 + "%";
            });
            
            document.getElementById("valNeuralVelocity").textContent = Math.floor(Math.random() * 20 + 80) + "%";
        }

        document.getElementById("btnVoiceTrigger").addEventListener("click", initSystem);
    </script>
</body>
</html>

<<script>

        // --- Dashboard Simulation Logic ---
        setInterval(() => {

</body>
</html>
