<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive AI - Comprehensive Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- General Layout & Design Tokens --- */
        :root {
            --bg-dark-main: #0b0f19;
            --bg-dark-panel: #141b2d;
            --border-color: #222f4c;
            --neon-blue: #00f3ff;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-rose: #ff3366;
            --text-primary: #f0f4f8;
            --text-secondary: #8a99ad;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark-main);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Cross-Platform Responsive Navigation --- */
        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px 5%;
            background: rgba(20, 27, 45, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s ease; padding: 5px 10px; }
        nav ul li a:hover { color: var(--neon-blue); }

        /* --- Responsive Hero Console --- */
        .hero { padding: 40px 5% 20px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .hero p { color: var(--text-secondary); margin-bottom: 25px; font-size: 0.95rem; }

        .voice-console-card {
            background: var(--bg-dark-panel);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        /* --- Emotion Graph Panel Interface Styling --- */
        .emotion-graph-card {
            background: var(--bg-dark-panel);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .graph-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #1e2942; padding-bottom: 10px;
        }
        .graph-header h4 { font-size: 1rem; font-weight: 600; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .active-emotion-badge {
            background: #1e2942; color: var(--neon-blue); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; border: 1px solid rgba(0, 243, 255, 0.2); transition: all 0.3s ease;
        }

        .chart-wrapper { position: relative; height: 260px; width: 100%; margin: 0 auto; }
        #emotionChart { width: 100% !important; height: 100% !important; }

        /* --- Advanced Waveform & Spectrogram Containers --- */
        .audio-scope-container {
            position: relative;
            width: 100%;
            height: 100px;
            background: #090d16;
            border: 1px solid #1a243a;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .audio-scope-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .voice-status-indicator { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; font-weight: 600; font-size: 0.9rem; }
        .status-dot { width: 10px; height: 10px; background-color: #64748b; border-radius: 50%; transition: all 0.4s ease; }
        .status-dot.active { background-color: var(--neon-rose); box-shadow: 0 0 12px var(--neon-rose); animation: pulseGlow 1.5s infinite alternate; }

        @keyframes pulseGlow { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .voice-transcript-box {
            background: #090d16; padding: 15px; border-radius: 10px; font-family: monospace; min-height: 65px; font-size: 0.85rem; color: var(--text-secondary); border: 1px solid #1a243a; word-break: break-word;
        }

        .hero-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 400px; margin: 0 auto; }
        .btn { width: 100%; padding: 15px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; font-size: 0.95rem; }
        
        .voice-btn { background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); color: #fff; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .voice-btn.listening { background: var(--neon-rose); box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3); }
